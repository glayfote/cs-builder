[scan]
project_root = "testdata/monorepo/pfm"
exclude = ["**/packages", "legacy/**"]

[[scan.roots]]
path = "3_common"
shared_dll_dir = "5_dll/common"

[[scan.roots]]
path = "4_driver"
shared_dll_dir = "5_dll/driver"

[commands]
dotnet = "C:/Program Files/dotnet/dotnet.exe"
msbuild = "C:/Program Files/Microsoft Visual Studio/18/Community/Msbuild/Current/Bin/MSBuild.exe"

[defaults]
build_cmd = "msbuild"
config = "Debug"
max_parallel = 4

[log]
dir = "logs"       # ログディレクトリ（デフォルト: "logs"）
level = "info"     # debug / info / warn / error（デフォルト: "info"）
